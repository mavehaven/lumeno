<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slimshot · Business Plan</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap');
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: #0a0a0f;
            font-family: 'DM Sans', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 3rem 1.5rem;
        }
        .card {
            background: linear-gradient(135deg, #13131f 0%, #1a1a2e 100%);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 28px;
            padding: 4rem 3.5rem;
            text-align: center;
            max-width: 640px;
            width: 100%;
            box-shadow: 0 40px 80px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.06);
        }
        .logo {
            font-family: 'Syne', sans-serif;
            font-weight: 800;
            font-size: 3.2rem;
            color: #fff;
            letter-spacing: -1px;
            margin-bottom: 0.3rem;
        }
        .logo span { color: #f43f5e; }
        .sub {
            color: rgba(255,255,255,0.45);
            font-size: 1rem;
            font-weight: 300;
            margin-bottom: 2rem;
            letter-spacing: 0.02em;
        }
        .pills {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 0.5rem;
            margin-bottom: 2.8rem;
        }
        .pill {
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.1);
            color: rgba(255,255,255,0.7);
            padding: 0.35rem 1rem;
            border-radius: 100px;
            font-size: 0.82rem;
            font-weight: 500;
        }
        .pill.accent { background: rgba(244,63,94,0.15); border-color: rgba(244,63,94,0.4); color: #f87171; }
        .btn {
            background: #f43f5e;
            border: none;
            color: white;
            font-family: 'Syne', sans-serif;
            font-weight: 700;
            font-size: 1.1rem;
            padding: 1.1rem 3rem;
            border-radius: 100px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 12px;
            transition: all 0.2s ease;
            letter-spacing: 0.01em;
            box-shadow: 0 8px 32px rgba(244,63,94,0.4);
        }
        .btn:hover { background: #e11d48; transform: translateY(-2px); box-shadow: 0 14px 40px rgba(244,63,94,0.5); }
        .btn:active { transform: translateY(0); }
        .btn i { font-size: 1rem; }
        .status {
            margin-top: 1.8rem;
            font-size: 0.85rem;
            color: rgba(255,255,255,0.3);
        }
        #progressBar {
            display: none;
            margin-top: 1.5rem;
            background: rgba(255,255,255,0.08);
            border-radius: 100px;
            height: 4px;
            overflow: hidden;
        }
        #progressFill {
            height: 100%;
            background: #f43f5e;
            border-radius: 100px;
            width: 0%;
            transition: width 0.3s ease;
        }
        #hiddenFormContainer { display: none; }
    </style>
</head>
<body>

<div class="card">
    <div class="logo">Slim<span>shot</span></div>
    <div class="sub">Professional Business Plan · KwaZulu-Natal & Pretoria</div>
    <div class="pills">
        <span class="pill accent">R1M Funding</span>
        <span class="pill accent">R150k Monthly Revenue</span>
        <span class="pill">Current Assets R12,500</span>
        <span class="pill">KZN · Pretoria</span>
        <span class="pill">✓ Corrected per feedback</span>
    </div>
    <button class="btn" id="downloadBtn">
        <i class="fas fa-file-pdf"></i> Download Business Plan PDF
    </button>
    <div id="progressBar"><div id="progressFill"></div></div>
    <div class="status" id="statusText">Full 15-section business plan · corrected layout</div>
</div>

<!-- DATA STORE -->
<div id="hiddenFormContainer">
    <input type="text" id="businessName" value="Slimshot">
    <select id="businessType"><option value="Retail / Apparel" selected>Retail / Apparel</option></select>
    <input type="text" id="location" value="KwaZulu-Natal & Pretoria, South Africa">
    <input type="hidden" id="legalStructure" value="Pty Ltd">
    <textarea id="missionStatement">To spread love through quality, ethically produced clothing while building an empowered community; every purchase supports local social upliftment projects.</textarea>
    <textarea id="products">Ethical streetwear, custom uniforms for NGOs and schools, branded merchandise for events, and limited-edition artist collaborations.</textarea>
    <textarea id="targetMarket">1. Young conscious consumers (18-35) in KZN major metros (Durban, Pietermaritzburg) and Pretoria/Tshwane. 2. NGOs and NPOs in both provinces needing affordable, custom uniforms (education, health, community). 3. Private schools in KZN and Gauteng seeking quality sportswear and spirit wear. 4. Small businesses in Durban and Pretoria looking for branded staff apparel. 5. Event organisers for festivals and conferences across both regions.</textarea>
    <input type="number" id="marketSize" value="98000000000">
    <input type="number" id="marketShare" value="0.002">
    <input type="number" id="monthlyRevenue" value="150000">
    <input type="number" id="monthlyExpenses" value="100000">
    <input type="number" id="startupCost" value="1000000">
    <input type="number" id="fundingNeeded" value="1000000">
    <input type="number" id="growthRate" value="15">
    <input type="text" id="competition" value="Local streetwear brands (e.g. Bathu, Drip), generic uniform suppliers, but none combine ethical mission with dedicated B2B focus for NGOs.">
    <textarea id="competitiveAdvantage">Exclusive focus on purpose-driven branding with direct relationships with NGOs and schools through a dedicated sales team. First South African apparel brand to offer a buy-one-give-one model for school uniforms. Strong advisory board with retail and development finance experience.</textarea>
    <textarea id="debtRepayment">R500k term loan (5 years, 12% p.a.) - monthly installments R11,122. Remaining R500k from equity (investor receives 25% stake).</textarea>
    <textarea id="marketingStrategy">1. Micro-influencer campaigns with local artists and activists. 2. Direct outreach to NGOs and schools via dedicated sales reps. 3. Content marketing around social impact stories (Instagram, TikTok). 4. Pop-up activations at markets and university campuses. 5. Referral discounts for B2B clients.</textarea>
    <textarea id="managementTeam">ZAMANI SHABALALA - Founder and CEO (over 10 years in customer service and brand development). | MAVUSO SHABALALA - HR and Operations Director (ex-Woolworths, extensive retail operations background). | SIYABONGA ZIKALALA - Human Behaviour Analyst and Clinical Psychologist (market trend analysis and consumer insights). | PEACE MASUKU - Finance and Digital Lead (CA(SA) candidate, certified in digital marketing). | NOKUTHULA KHUMALO - Textile and Design Expert (8 years industry experience in sustainable fashion).</textarea>
    <textarea id="businessGoals">Year 1: Sign 20 NGO/school contracts, launch e-commerce platform, achieve R1.8M turnover, net profit R600k. Year 2: Expand to 50 B2B accounts, open small showroom in Durban, achieve R2.5M turnover. Year 3: R4M turnover, 20% EBITDA margin, prepare for Series A funding round.</textarea>
    <textarea id="strengths">Experienced and passionate team with deep community roots; clear social mission differentiates from all competitors; diversified revenue streams (B2B and D2C); low initial overhead through partnership with local manufacturers.</textarea>
    <textarea id="weaknesses">Brand awareness currently limited to early adopters; reliance on founder relationships for initial contracts; working capital constraints in the first year of operations.</textarea>
    <textarea id="opportunities">Growing demand for ethical fashion and responsible sourcing; government and corporate social procurement budgets expanding; potential to expand into other African countries through established NGO networks.</textarea>
    <textarea id="threats">Economic downturn affecting disposable income of target consumers; new entrants copying the ethical model; currency volatility impacting imported raw materials (mitigated by local sourcing priority).</textarea>
    <textarea id="exitStrategy">Target acquisition by a larger retail group (e.g. TFG, Mr Price Group) within 5 to 7 years, or sale to a BEE investment holding company. An employee ownership trust structure is also being prepared as an alternative exit vehicle.</textarea>
    <input type="email" id="contactEmail" value="invest@slimshot.co.za">
    <input type="tel" id="contactPhone" value="+27 31 234 5678">
</div>

<script>
(function () {
    // ─── CONSTANTS ────────────────────────────────────────────────────────
    const PAGE_W = 210;   // A4 mm
    const PAGE_H = 297;
    const ML = 18;        // left margin
    const MR = 18;        // right margin
    const MT = 22;        // top margin
    const MB = 20;        // bottom margin
    const TW = PAGE_W - ML - MR;   // usable text width
    const LH = 6.5;       // normal line height mm
    const SH = 14;        // space after section heading

    // ─── CAPEX / TIMELINE DATA ───────────────────────────────────────────
    const capexData = [
        { name: 'Lease deposit and fit-out (workshop/showroom, Durban)', cost: 200000, timing: 'Month 1' },
        { name: 'Embroidery and screen printing equipment',              cost: 250000, timing: 'Month 1' },
        { name: 'Initial fabric and blank inventory',                    cost: 150000, timing: 'Month 1' },
        { name: 'E-commerce website and POS system',                    cost:  80000, timing: 'Month 1' },
        { name: 'Delivery van (second-hand)',                            cost: 120000, timing: 'Month 2' },
        { name: 'Marketing and branding (launch campaign)',              cost: 100000, timing: 'Month 1-3' },
        { name: 'Working capital buffer',                                cost: 100000, timing: 'Ongoing' }
    ];

    const timelineData = [
        { date: 'Month 1',  desc: 'Secure Durban base, purchase equipment, finalise branding. Begin Pretoria market research.' },
        { date: 'Month 3',  desc: 'First 5 KZN NGO/school contracts signed; e-commerce live. Pretoria sales rep appointed.' },
        { date: 'Month 6',  desc: '12 active B2B clients across KZN and Pretoria, monthly revenue R80k, breakeven reached.' },
        { date: 'Month 9',  desc: 'Expand to 20 clients across both regions, introduce loyalty and referral programme.' },
        { date: 'Month 12', desc: '20+ clients across KZN and Pretoria, R150k monthly revenue, net profit R50k per month.' }
    ];

    // ─── DATA HELPERS ─────────────────────────────────────────────────────
    function v(id) { return document.getElementById(id)?.value || ''; }
    function num(id) { return Number(v(id)) || 0; }
    function fmt(n) { return 'R' + Math.round(n).toLocaleString('en-ZA'); }

    // ─── PDF WRITER CLASS ─────────────────────────────────────────────────
    class PdfWriter {
        constructor() {
            const { jsPDF } = window.jspdf;
            this.doc = new jsPDF({ unit: 'mm', format: 'a4' });
            this.y = MT;
        }

        get pageH() { return PAGE_H; }
        get pageW() { return PAGE_W; }

        // ensure there's `need` mm before bottom margin; add page if not
        need(mm) {
            if (this.y + mm > PAGE_H - MB) {
                this.doc.addPage();
                this.y = MT;
                return true;
            }
            return false;
        }

        // ── typography helpers ──
        font(style = 'normal', size = 10, color = [30, 30, 30]) {
            this.doc.setFont('helvetica', style);
            this.doc.setFontSize(size);
            this.doc.setTextColor(...color);
        }

        // ── write a block of wrapped text; returns final y ──
        writeText(text, x, maxW, opts = {}) {
            const { fontSize = 10, style = 'normal', color = [40, 40, 40], indent = 0, leading = LH } = opts;
            this.font(style, fontSize, color);
            const lines = this.doc.splitTextToSize(text, maxW - indent);
            lines.forEach(line => {
                this.need(leading + 2);
                this.doc.text(line, x + indent, this.y);
                this.y += leading;
            });
        }

        // ── section heading (navy bar) ──
        sectionHeading(title) {
            this.need(18);
            this.doc.setFillColor(15, 30, 80);
            this.doc.rect(ML, this.y - 5, TW, 11, 'F');
            this.font('bold', 12, [255, 255, 255]);
            this.doc.text(title, ML + 4, this.y + 2.5);
            this.y += SH;
        }

        // ── sub-heading ──
        subHeading(title) {
            this.need(12);
            this.font('bold', 10.5, [15, 30, 80]);
            this.doc.text(title, ML, this.y);
            this.y += 7;
        }

        // ── bullet list from plain text (split on newline or numbered items) ──
        bulletList(text, opts = {}) {
            const { fontSize = 9.5, leading = LH } = opts;
            const items = text.split(/\n|(?=\d+\.\s)/).map(s => s.replace(/^\d+\.\s*/, '').trim()).filter(Boolean);
            items.forEach(item => {
                this.need(leading + 3);
                this.font('normal', fontSize, [40, 40, 40]);
                this.doc.text('\u2022', ML + 1, this.y);
                const lines = this.doc.splitTextToSize(item, TW - 10);
                lines.forEach((line, i) => {
                    if (i > 0) this.need(leading);
                    this.doc.text(line, ML + 7, this.y);
                    this.y += leading;
                });
                this.y += 1;
            });
        }

        // ── pipe-separated team members ──
        teamList(text) {
            const members = text.split('|').map(s => s.trim()).filter(Boolean);
            members.forEach(member => {
                this.need(20);
                const [name, ...rest] = member.split(' - ');
                this.font('bold', 10, [15, 30, 80]);
                this.doc.text((name || '').trim(), ML + 2, this.y);
                this.y += 5.5;
                if (rest.length) {
                    this.writeText(rest.join(' - ').trim(), ML + 2, TW - 4, { fontSize: 9.5, color: [60, 60, 60] });
                }
                this.y += 3;
            });
        }

        // ── robust table ──
        // cols: [{header, width?, align?}]   rows: string[][]
        table(cols, rows, opts = {}) {
            const { headerBg = [15, 30, 80], rowBg1 = [245, 247, 252], rowBg2 = [255, 255, 255], rowH = 9, fontSize = 8.5 } = opts;

            // compute column widths
            const totalFixed = cols.reduce((s, c) => s + (c.width || 0), 0);
            const autoCount = cols.filter(c => !c.width).length;
            const autoW = autoCount > 0 ? (TW - totalFixed) / autoCount : 0;
            const widths = cols.map(c => c.width || autoW);

            // header
            this.need(rowH + 4);
            let x = ML;
            this.doc.setFillColor(...headerBg);
            this.doc.rect(ML, this.y - rowH + 2, TW, rowH, 'F');
            cols.forEach((col, i) => {
                this.font('bold', fontSize, [255, 255, 255]);
                const txt = this.doc.splitTextToSize(col.header, widths[i] - 3);
                this.doc.text(txt[0], x + 2, this.y - 0.5);
                x += widths[i];
            });
            this.y += 2;

            // rows
            rows.forEach((row, ri) => {
                // measure this row height
                let maxLines = 1;
                row.forEach((cell, ci) => {
                    const lines = this.doc.splitTextToSize(String(cell ?? ''), widths[ci] - 4);
                    maxLines = Math.max(maxLines, lines.length);
                });
                const rh = Math.max(rowH, maxLines * 5.5 + 3);

                this.need(rh + 2);
                this.doc.setFillColor(...(ri % 2 === 0 ? rowBg1 : rowBg2));
                this.doc.rect(ML, this.y - 5, TW, rh, 'F');

                x = ML;
                row.forEach((cell, ci) => {
                    this.font('normal', fontSize, [30, 30, 30]);
                    const lines = this.doc.splitTextToSize(String(cell ?? ''), widths[ci] - 4);
                    lines.forEach((line, li) => {
                        this.doc.text(line, x + 2, this.y - 0.5 + li * 5);
                    });
                    x += widths[ci];
                });
                this.y += rh;
            });
            this.y += 6;
        }

        // ── key-value pairs in two columns ──
        kvPairs(pairs) {
            pairs.forEach(([k, v]) => {
                this.need(8);
                this.font('bold', 9.5, [15, 30, 80]);
                this.doc.text(k + ':', ML, this.y);
                this.font('normal', 9.5, [40, 40, 40]);
                const lines = this.doc.splitTextToSize(v, TW - 45);
                lines.forEach((line, i) => {
                    if (i > 0) { this.need(LH); this.doc.text(line, ML + 45, this.y); }
                    else this.doc.text(line, ML + 45, this.y);
                    this.y += LH;
                });
            });
            this.y += 4;
        }

        // ── divider line ──
        divider() {
            this.need(6);
            this.doc.setDrawColor(210, 215, 230);
            this.doc.setLineWidth(0.3);
            this.doc.line(ML, this.y - 2, ML + TW, this.y - 2);
            this.y += 4;
        }

        // ── space ──
        space(mm = 6) { this.y += mm; }

        // ── page footers ──
        addFooters(name) {
            const total = this.doc.internal.getNumberOfPages();
            for (let i = 1; i <= total; i++) {
                this.doc.setPage(i);
                this.font('normal', 7, [150, 150, 150]);
                this.doc.text(`${name} — Business Plan`, ML, PAGE_H - 10);
                this.doc.text('CONFIDENTIAL', PAGE_W / 2, PAGE_H - 10, { align: 'center' });
                this.doc.text(`Page ${i} of ${total}`, PAGE_W - MR, PAGE_H - 10, { align: 'right' });
            }
        }

        save(filename) {
            this.doc.save(filename);
        }
    }

    // ─── GENERATE PDF ─────────────────────────────────────────────────────
    function generate() {
        setProgress(5);

        const w = new PdfWriter();
        const d = w.doc;

        const biz      = v('businessName');
        const loc      = v('location');
        const legal    = v('legalStructure');
        const mission  = v('missionStatement');
        const products = v('products');
        const target   = v('targetMarket');
        const mktSize  = num('marketSize');
        const mktSh    = num('marketShare');
        const rev      = num('monthlyRevenue');
        const exp      = num('monthlyExpenses');
        const startup  = num('startupCost');
        const funding  = num('fundingNeeded');
        const growth   = num('growthRate') / 100;
        const comp     = v('competition');
        const compAdv  = v('competitiveAdvantage');
        const debt     = v('debtRepayment');
        const mktStrat = v('marketingStrategy');
        const team     = v('managementTeam');
        const goals    = v('businessGoals');
        const sw       = v('strengths');
        const wk       = v('weaknesses');
        const opp      = v('opportunities');
        const thr      = v('threats');
        const exits    = v('exitStrategy');
        const email    = v('contactEmail');
        const phone    = v('contactPhone');

        const profit   = rev - exp;
        const yr1Rev   = rev * 12;
        const yr2Rev   = yr1Rev * (1 + growth);
        const yr3Rev   = yr2Rev * (1 + growth);
        const yr1Exp   = exp * 12;
        const yr2Exp   = yr1Exp * 1.1;
        const yr3Exp   = yr2Exp * 1.1;

        // ════════════════════════════════════════════════════════════
        // PAGE 1 — COVER
        // ════════════════════════════════════════════════════════════
        d.setFillColor(10, 18, 55);
        d.rect(0, 0, PAGE_W, PAGE_H, 'F');
        d.setFillColor(220, 20, 60);
        d.rect(0, PAGE_H - 30, PAGE_W, 30, 'F');

        // decorative circle
        d.setFillColor(220, 20, 60, 0.15);
        d.circle(PAGE_W - 30, 50, 55, 'F');

        w.font('bold', 38, [255, 255, 255]);
        d.text(biz.toUpperCase(), ML, 75);
        w.font('normal', 14, [180, 195, 230]);
        d.text('PROFESSIONAL BUSINESS PLAN', ML, 88);
        w.font('normal', 10, [130, 150, 200]);
        d.text(legal + '  |  ' + loc, ML, 100);
        d.text('Date: ' + new Date().toLocaleDateString('en-ZA', { year: 'numeric', month: 'long', day: 'numeric' }), ML, 109);

        // key stats
        const stats = [
            ['Funding Required', fmt(funding)],
            ['Monthly Revenue Target', fmt(rev)],
            ['Current Assets', fmt(12500)],
            ['Est. Market Share', (mktSh * 100).toFixed(3) + '%']
        ];
        let sx = ML, sy = 145;
        stats.forEach(([lbl, val]) => {
            d.setFillColor(255, 255, 255, 0.06);
            d.roundedRect(sx, sy, 83, 28, 3, 3, 'F');
            w.font('bold', 13, [255, 255, 255]);
            d.text(val, sx + 6, sy + 17);
            w.font('normal', 7.5, [160, 175, 220]);
            d.text(lbl, sx + 6, sy + 24);
            sx += 87;
            if (sx > ML + 88) { sx = ML; sy += 34; }
        });

        w.font('normal', 8, [255, 255, 255]);
        d.text('CONFIDENTIAL  —  ' + email + '  |  ' + phone, ML, PAGE_H - 14);

        setProgress(15);

        // ════════════════════════════════════════════════════════════
        // PAGE 2 — TABLE OF CONTENTS
        // ════════════════════════════════════════════════════════════
        d.addPage();
        w.y = MT;
        w.sectionHeading('TABLE OF CONTENTS');

        const toc = [
            '1.  Executive Summary', '2.  Business Description', '3.  Market Analysis',
            '4.  Products & Services', '5.  Marketing & Sales Strategy', '6.  Management Team',
            '7.  Financial Projections', '8.  Cash Flow Forecast (Year 1)', '9.  Balance Sheet',
            '10. Capital Expenditure Breakdown', '11. Implementation Timeline',
            '12. Risk Analysis', '13. Funding Requirements', '14. Exit Strategy',
            '15. Business Goals', '16. Appendix'
        ];
        toc.forEach(item => {
            w.need(8);
            w.font('normal', 10.5, [30, 30, 30]);
            d.text(item, ML + 4, w.y);
            w.y += 8;
        });

        setProgress(20);

        // ════════════════════════════════════════════════════════════
        // PAGE 3+ — SECTIONS
        // ════════════════════════════════════════════════════════════
        d.addPage(); w.y = MT;

        // 1. EXECUTIVE SUMMARY
        w.sectionHeading('1.  EXECUTIVE SUMMARY');
        w.writeText(
            `${biz} is a ${legal} ${v('businessType').toLowerCase()} business based in ${loc}. ` +
            `The company is purpose-driven, uniting ethical fashion with measurable community impact across KwaZulu-Natal and Pretoria, expanding its dual-market reach.`,
            ML, TW, { fontSize: 10, leading: LH + 0.5 }
        );
        w.space(4);
        w.subHeading('Mission Statement');
        w.writeText(mission, ML, TW, { fontSize: 9.5, color: [60, 60, 60], leading: LH });
        w.space(5);
        w.subHeading('Key Financial Highlights');
        w.kvPairs([
            ['Monthly Revenue Target', fmt(rev)],
            ['Monthly Operating Expenses', fmt(exp)],
            ['Net Monthly Profit', fmt(profit)],
            ['Annual Revenue (Year 1)', fmt(yr1Rev)],
            ['Funding Required', fmt(funding)],
            ['Market Opportunity (share)', fmt(mktSize * mktSh)]
        ]);

        // 2. BUSINESS DESCRIPTION
        w.sectionHeading('2.  BUSINESS DESCRIPTION');
        w.writeText(`${biz} specialises in ${products}`, ML, TW, { fontSize: 9.5, leading: LH });
        w.space(5);
        w.subHeading('Competitive Advantage');
        w.writeText(compAdv, ML, TW, { fontSize: 9.5, color: [50, 50, 50], leading: LH });

        setProgress(35);

        // 3. MARKET ANALYSIS
        d.addPage(); w.y = MT;
        w.sectionHeading('3.  MARKET ANALYSIS');
        w.kvPairs([
            ['Total Market Size', fmt(mktSize)],
            ['Target Market Share', (mktSh * 100).toFixed(3) + '%'],
            ['Projected Market Revenue', fmt(mktSize * mktSh)],
            ['Annual Growth Rate', (growth * 100).toFixed(1) + '%']
        ]);
        w.subHeading('Target Market Segments');
        w.bulletList(target);
        w.space(4);
        w.subHeading('Competitive Landscape');
        w.writeText(comp, ML, TW, { fontSize: 9.5, leading: LH });

        // 4. PRODUCTS & SERVICES
        w.sectionHeading('4.  PRODUCTS & SERVICES');
        w.bulletList(products);

        // 5. MARKETING STRATEGY
        w.sectionHeading('5.  MARKETING & SALES STRATEGY');
        w.bulletList(mktStrat);

        setProgress(50);

        // 6. MANAGEMENT TEAM
        d.addPage(); w.y = MT;
        w.sectionHeading('6.  MANAGEMENT TEAM');
        w.teamList(team);

        // 7. FINANCIAL PROJECTIONS
        w.sectionHeading('7.  FINANCIAL PROJECTIONS');

        // startup
        w.subHeading('Startup Cost Breakdown');
        w.table(
            [{ header: 'Cost Item' }, { header: 'Amount (ZAR)', width: 40 }, { header: 'Timing', width: 30 }],
            [
                ...capexData.map(c => [c.name, fmt(c.cost), c.timing]),
                ['TOTAL', fmt(capexData.reduce((s, c) => s + c.cost, 0)), '']
            ]
        );

        // monthly expenses
        w.subHeading('Monthly Operating Expenses');
        w.table(
            [{ header: 'Category' }, { header: 'Amount (ZAR)', width: 45 }],
            [
                ['Rent & Utilities', fmt(exp * 0.20)],
                ['Staff & Salaries', fmt(exp * 0.35)],
                ['Marketing & Advertising', fmt(exp * 0.15)],
                ['Insurance & Legal', fmt(exp * 0.05)],
                ['Logistics & Delivery', fmt(exp * 0.10)],
                ['Other Operating Expenses', fmt(exp * 0.15)],
                ['TOTAL MONTHLY EXPENSES', fmt(exp)]
            ]
        );

        setProgress(62);

        // 3-year projections
        d.addPage(); w.y = MT;
        w.sectionHeading('3-YEAR REVENUE PROJECTIONS');
        w.table(
            [{ header: 'Metric', width: 60 }, { header: 'Year 1' }, { header: 'Year 2' }, { header: 'Year 3' }],
            [
                ['Revenue',          fmt(yr1Rev),                       fmt(yr2Rev),                       fmt(yr3Rev)],
                ['Operating Expenses',fmt(yr1Exp),                      fmt(yr2Exp),                       fmt(yr3Exp)],
                ['Gross Profit',      fmt(yr1Rev - yr1Exp),             fmt(yr2Rev - yr2Exp),             fmt(yr3Rev - yr3Exp)],
                ['Profit Margin',
                    ((yr1Rev - yr1Exp) / yr1Rev * 100).toFixed(1) + '%',
                    ((yr2Rev - yr2Exp) / yr2Rev * 100).toFixed(1) + '%',
                    ((yr3Rev - yr3Exp) / yr3Rev * 100).toFixed(1) + '%'
                ]
            ]
        );

        // 8. CASH FLOW
        w.sectionHeading('8.  CASH FLOW FORECAST (YEAR 1)');
        let cum = 0;
        const cfRows = [];
        for (let m = 1; m <= 12; m++) {
            const ci = Math.round(rev * (1 + growth * m / 12));
            const co = Math.round(exp * (1 + 0.05 * m / 12));
            cum += ci - co;
            cfRows.push([`Month ${m}`, fmt(ci), fmt(co), fmt(ci - co), fmt(cum)]);
        }
        w.table(
            [{ header: 'Month', width: 22 }, { header: 'Cash In' }, { header: 'Cash Out' }, { header: 'Net Cash Flow' }, { header: 'Cumulative' }],
            cfRows
        );

        setProgress(74);

        // 9. BALANCE SHEET
        d.addPage(); w.y = MT;
        w.sectionHeading('9.  BALANCE SHEET (END YEAR 1)');
        const currAssets = 12500;
        const fixedAssets = startup;
        const totAssets = currAssets + fixedAssets;
        const currLiab = yr1Exp * 0.2;
        const ltDebt = funding * 0.5;
        const equity = totAssets - currLiab - ltDebt;
        w.table(
            [{ header: 'Line Item', width: 90 }, { header: 'Amount (ZAR)' }],
            [
                ['ASSETS', ''],
                ['Current Assets (cash & receivables)', fmt(currAssets)],
                ['Fixed Assets (equipment, fit-out, inventory)', fmt(fixedAssets)],
                ['TOTAL ASSETS', fmt(totAssets)],
                ['LIABILITIES', ''],
                ['Current Liabilities', fmt(currLiab)],
                ['Long-Term Debt (R500k term loan)', fmt(ltDebt)],
                ['EQUITY', fmt(equity)],
                ['TOTAL LIABILITIES & EQUITY', fmt(totAssets)]
            ]
        );

        // 10. CAPEX
        w.sectionHeading('10. CAPITAL EXPENDITURE BREAKDOWN');
        w.table(
            [{ header: 'Item Description' }, { header: 'Cost (ZAR)', width: 40 }, { header: 'Timing', width: 28 }],
            capexData.map(c => [c.name, fmt(c.cost), c.timing])
        );

        // 11. TIMELINE
        w.sectionHeading('11. IMPLEMENTATION TIMELINE');
        w.table(
            [{ header: 'Milestone', width: 26 }, { header: 'Description' }],
            timelineData.map(t => [t.date, t.desc])
        );

        setProgress(84);

        // 12. RISK ANALYSIS
        d.addPage(); w.y = MT;
        w.sectionHeading('12. RISK ANALYSIS');

        w.subHeading('SWOT Summary');
        w.table(
            [{ header: 'Category', width: 30 }, { header: 'Detail' }],
            [
                ['Strengths', sw],
                ['Weaknesses', wk],
                ['Opportunities', opp],
                ['Threats', thr]
            ]
        );

        w.subHeading('Risk Mitigation Plan');
        w.table(
            [{ header: 'Risk', width: 45 }, { header: 'Probability', width: 25 }, { header: 'Impact', width: 22 }, { header: 'Mitigation Strategy' }],
            [
                ['Economic downturn', 'Medium', 'High', 'Diversify revenue streams (B2B + D2C); maintain 3-month cash buffer'],
                ['New market entrants', 'High', 'Medium', 'Continuous innovation; community loyalty programmes; IP protection'],
                ['Regulatory changes', 'Low', 'High', 'Regular legal reviews; active industry association membership'],
                ['Key personnel loss', 'Medium', 'High', 'Documented processes; equity incentives for core team'],
                ['Currency volatility', 'Medium', 'Medium', 'Prioritise local sourcing; forex hedging for imports']
            ]
        );

        // 13. FUNDING REQUIREMENTS
        w.sectionHeading('13. FUNDING REQUIREMENTS');
        w.kvPairs([
            ['Total Funding Required', fmt(funding)],
            ['Equity (25% stake)', fmt(funding * 0.5)],
            ['Debt (Term Loan)', fmt(funding * 0.5)]
        ]);
        w.space(3);
        w.subHeading('Repayment Schedule');
        w.writeText(debt, ML, TW, { fontSize: 9.5, leading: LH });

        setProgress(92);

        // 14. EXIT STRATEGY
        w.sectionHeading('14. EXIT STRATEGY');
        w.writeText(exits, ML, TW, { fontSize: 9.5, leading: LH });

        // 15. BUSINESS GOALS
        w.sectionHeading('15. BUSINESS GOALS');
        w.bulletList(goals);

        // 16. APPENDIX
        d.addPage(); w.y = MT;
        w.sectionHeading('16. APPENDIX');
        w.writeText('The following supporting documents are available upon request:', ML, TW, { fontSize: 9.5, color: [60, 60, 60] });
        w.space(4);
        w.bulletList([
            'Market research data and consumer survey results',
            'Product specifications, design samples and images',
            'Curriculum Vitae of each management team member',
            'Company registration certificate and SARS tax clearance',
            'Detailed financial model and assumptions workbook',
            'Supplier agreements and proof of manufacturing partnerships',
            'Signed or draft client contracts (NGOs and schools)',
            'Detailed CAPEX quotes from equipment suppliers'
        ].join('\n'));

        // ── footers ──
        w.addFooters(biz);

        setProgress(100);
        w.save(`${biz.replace(/\s+/g, '_')}_Business_Plan.pdf`);
        setTimeout(() => {
            document.getElementById('statusText').textContent = '✓ Download complete!';
            document.getElementById('progressBar').style.display = 'none';
        }, 600);
    }

    function setProgress(pct) {
        const bar = document.getElementById('progressBar');
        const fill = document.getElementById('progressFill');
        bar.style.display = 'block';
        fill.style.width = pct + '%';
        document.getElementById('statusText').textContent = pct < 100 ? 'Generating PDF…' : 'Finalising…';
    }

    document.getElementById('downloadBtn').addEventListener('click', function () {
        this.disabled = true;
        this.textContent = 'Generating…';
        setTimeout(() => {
            try {
                generate();
            } catch (e) {
                console.error(e);
                document.getElementById('statusText').textContent = 'Error: ' + e.message;
            }
            this.disabled = false;
            this.innerHTML = '<i class="fas fa-file-pdf"></i> Download Business Plan PDF';
        }, 80);
    });
})();
</script>

<style>
.capex-item, .timeline-item { position: relative; }
.remove-capex, .remove-timeline { display: none; }
</style>
</body>
</html>
