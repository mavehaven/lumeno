<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Vector Foundations</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/mathjax/3.2.2/es5/tex-mml-chtml.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700&display=swap');

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #0c0c14;
  --surface: #13131f;
  --surface2: #1c1c2e;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.13);
  --cyan: #00e5ff;
  --magenta: #e040fb;
  --yellow: #ffd740;
  --orange: #ff6d00;
  --green: #69ff47;
  --text: #f0f0f8;
  --muted: #888898;
  --font-head: 'Syne', sans-serif;
  --font-mono: 'DM Mono', monospace;
  --r: 10px;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-mono);
  font-size: 13px;
  line-height: 1.6;
  min-height: 100dvh;
  padding: 16px;
  padding-bottom: env(safe-area-inset-bottom, 16px);
}

/* ── Layout ── */
.app { max-width: 1360px; margin: 0 auto; display: flex; flex-direction: column; gap: 14px; }

.header { text-align: center; padding: 8px 0 4px; }
.header h1 {
  font-family: var(--font-head);
  font-size: clamp(1.4rem, 4vw, 2.2rem);
  font-weight: 700;
  letter-spacing: -0.02em;
  background: linear-gradient(100deg, var(--cyan) 0%, var(--magenta) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.header p { color: var(--muted); font-size: clamp(11px, 2vw, 13px); margin-top: 4px; }

.layout {
  display: grid;
  grid-template-columns: 320px 1fr;
  gap: 14px;
  align-items: start;
}
@media (max-width: 900px) {
  .layout { grid-template-columns: 1fr; }
}

/* ── Theory Panel ── */
.theory-panel {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r);
  overflow: hidden;
  position: sticky;
  top: 16px;
  max-height: calc(100dvh - 32px);
  display: flex;
  flex-direction: column;
}
@media (max-width: 900px) {
  .theory-panel {
    position: fixed;
    inset: auto 0 0 0;
    top: auto;
    max-height: 75dvh;
    border-radius: var(--r) var(--r) 0 0;
    transform: translateY(100%);
    transition: transform 0.35s cubic-bezier(.32,.72,0,1);
    z-index: 200;
    border-bottom: none;
  }
  .theory-panel.open { transform: translateY(0); }
}

.theory-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 16px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.theory-title {
  font-family: var(--font-head);
  font-size: 14px;
  font-weight: 600;
  color: var(--magenta);
  display: flex;
  align-items: center;
  gap: 8px;
}
.theory-title::before {
  content: '';
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--magenta);
  box-shadow: 0 0 8px var(--magenta);
}

/* mobile drag handle */
.drag-handle {
  display: none;
  width: 36px; height: 4px;
  background: var(--border2);
  border-radius: 2px;
  margin: 10px auto 0;
}
@media (max-width: 900px) {
  .drag-handle { display: block; }
}

.close-btn {
  background: none; border: none; color: var(--muted);
  cursor: pointer; font-size: 18px; line-height: 1;
  width: 28px; height: 28px;
  display: flex; align-items: center; justify-content: center;
  border-radius: 6px;
  transition: background 0.15s, color 0.15s;
}
.close-btn:hover { background: var(--border); color: var(--text); }

.theory-body {
  overflow-y: auto;
  padding: 16px;
  flex: 1;
  scroll-behavior: smooth;
}
.theory-body::-webkit-scrollbar { width: 4px; }
.theory-body::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 2px; }

.th-section { margin-bottom: 18px; }
.th-section h3 {
  font-family: var(--font-head);
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--cyan);
  margin-bottom: 8px;
}
.th-section p { color: var(--muted); font-size: 12px; line-height: 1.65; }

.formula-box {
  background: rgba(0,229,255,0.04);
  border: 1px solid rgba(0,229,255,0.18);
  border-radius: 8px;
  padding: 12px 14px;
  margin: 10px 0;
  text-align: center;
  overflow-x: auto;
}

.prop-list { list-style: none; display: flex; flex-direction: column; gap: 6px; }
.prop-list li {
  font-size: 11.5px;
  color: var(--muted);
  display: flex;
  align-items: flex-start;
  gap: 8px;
}
.prop-list li::before { content: '—'; color: var(--magenta); flex-shrink: 0; margin-top: 1px; }

.hl-box {
  background: rgba(224,64,251,0.07);
  border-left: 3px solid var(--magenta);
  border-radius: 0 8px 8px 0;
  padding: 10px 12px;
  margin: 10px 0;
  font-size: 12px;
  color: var(--muted);
}
.ex-box {
  background: rgba(0,229,255,0.05);
  border-left: 3px solid var(--cyan);
  border-radius: 0 8px 8px 0;
  padding: 10px 12px;
  margin: 10px 0;
  font-size: 12px;
  color: var(--muted);
  overflow-x: auto;
}
.ins-box {
  background: rgba(255,215,64,0.06);
  border-left: 3px solid var(--yellow);
  border-radius: 0 8px 8px 0;
  padding: 10px 12px;
  margin: 10px 0;
  font-size: 12px;
  color: var(--muted);
}

/* ── Canvas Panel ── */
.canvas-panel {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 14px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

/* ── Controls ── */
.controls {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  align-items: center;
}

.mode-group { display: flex; gap: 6px; flex-wrap: wrap; }

.btn {
  font-family: var(--font-mono);
  font-size: 12px;
  padding: 7px 14px;
  border-radius: 7px;
  border: 1px solid var(--border2);
  background: transparent;
  color: var(--muted);
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
  user-select: none;
}
.btn:hover { background: var(--border); color: var(--text); border-color: var(--border2); }
.btn.active {
  background: rgba(0,229,255,0.12);
  border-color: var(--cyan);
  color: var(--cyan);
}
.btn-icon {
  padding: 7px 12px;
  display: flex; align-items: center; gap: 6px;
}
.btn-play {
  background: rgba(255,109,0,0.12);
  border-color: var(--orange);
  color: var(--orange);
}
.btn-play:hover { background: rgba(255,109,0,0.22); color: var(--orange); }
.btn-play:disabled { opacity: 0.4; cursor: not-allowed; }
.btn-reset { color: var(--muted); }
.btn-theory {
  background: rgba(224,64,251,0.1);
  border-color: var(--magenta);
  color: var(--magenta);
  display: none;
}
@media (max-width: 900px) { .btn-theory { display: flex; } }

.spacer { flex: 1; min-width: 0; }

/* ── Scalar slider ── */
.slider-row {
  display: flex;
  align-items: center;
  gap: 12px;
  background: var(--surface2);
  border-radius: 8px;
  padding: 10px 14px;
  border: 1px solid var(--border);
}
.slider-row label { font-size: 12px; color: var(--muted); white-space: nowrap; flex-shrink: 0; }
.slider-row input[type=range] {
  flex: 1;
  -webkit-appearance: none;
  height: 4px;
  border-radius: 2px;
  background: var(--border2);
  outline: none;
  cursor: pointer;
}
.slider-row input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 16px; height: 16px;
  border-radius: 50%;
  background: var(--orange);
  cursor: pointer;
  box-shadow: 0 0 6px rgba(255,109,0,0.5);
}
.slider-row input[type=range]::-moz-range-thumb {
  width: 16px; height: 16px;
  border-radius: 50%;
  background: var(--orange);
  border: none;
  cursor: pointer;
}
.slider-val { font-size: 12px; color: var(--orange); min-width: 40px; text-align: right; }

/* ── Canvas ── */
.canvas-wrap {
  width: 100%;
  border-radius: 8px;
  overflow: hidden;
  border: 1px solid var(--border);
  position: relative;
  background: #08080f;
  /* maintain aspect ratio via JS */
}
canvas {
  display: block;
  width: 100%;
  height: auto;
  cursor: crosshair;
  touch-action: none;
}

/* ── Vector info ── */
.vec-info {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
}
@media (max-width: 480px) {
  .vec-info { grid-template-columns: 1fr; }
}
@media (min-width: 481px) and (max-width: 700px) {
  .vec-info { grid-template-columns: repeat(3, 1fr); }
}

.vi-card {
  border-radius: 8px;
  padding: 12px 14px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-left-width: 3px;
}
.vi-card.va { border-left-color: var(--cyan); }
.vi-card.vb { border-left-color: var(--magenta); }
.vi-card.vr { border-left-color: var(--yellow); }

.vi-label { font-size: 11px; color: var(--muted); margin-bottom: 4px; letter-spacing: 0.06em; text-transform: uppercase; }
.vi-value { font-size: 14px; font-weight: 500; font-family: var(--font-mono); }
.vi-mag { font-size: 11px; color: var(--muted); margin-top: 3px; }

/* ── Overlay ── */
.overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.55);
  z-index: 199;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s;
}
.overlay.active { opacity: 1; pointer-events: auto; }

/* MathJax */
.MathJax { color: var(--text) !important; }
mjx-container[jax="CHTML"][display="true"] { text-align: center !important; margin: 8px 0 !important; }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>Vector Foundations</h1>
    <p>Interactive visualization · Drag vector endpoints to explore</p>
  </div>

  <div class="layout">
    <!-- Theory Panel -->
    <aside class="theory-panel" id="theoryPanel">
      <div class="drag-handle" id="dragHandle"></div>
      <div class="theory-header">
        <span class="theory-title">Vector Theory</span>
        <button class="close-btn" id="closeBtn" aria-label="Close theory">✕</button>
      </div>
      <div class="theory-body" id="theoryBody"></div>
    </aside>

    <!-- Canvas Panel -->
    <div class="canvas-panel">
      <div class="controls">
        <div class="mode-group">
          <button class="btn active" id="btnAdd">Addition</button>
          <button class="btn" id="btnSca">Scalar ×</button>
          <button class="btn" id="btnDot">Dot Product</button>
        </div>
        <div class="spacer"></div>
        <button class="btn btn-icon btn-play" id="btnAnim" title="Animate">
          <svg width="10" height="12" viewBox="0 0 10 12" fill="currentColor"><path d="M0 0l10 6-10 6V0z"/></svg>
          Animate
        </button>
        <button class="btn btn-icon btn-reset" id="btnReset" title="Reset">
          <svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M11 6A5 5 0 1 1 8.5 1.8"/><polyline points="7,0 9,2 7,4"/></svg>
          Reset
        </button>
        <button class="btn btn-icon btn-theory" id="btnTheory">
          <svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="6" cy="6" r="5"/><line x1="6" y1="5.5" x2="6" y2="8.5"/><circle cx="6" cy="3.5" r="0.6" fill="currentColor" stroke="none"/></svg>
          Theory
        </button>
      </div>

      <div class="slider-row" id="sliderRow" style="display:none">
        <label>Scalar</label>
        <input type="range" id="scalarSlider" min="-3" max="3" step="0.1" value="1.5">
        <span class="slider-val" id="scalarVal">1.50</span>
      </div>

      <div class="canvas-wrap" id="canvasWrap">
        <canvas id="vc"></canvas>
      </div>

      <div class="vec-info">
        <div class="vi-card va">
          <div class="vi-label">Vector a</div>
          <div class="vi-value" id="viA">(150, 100)</div>
          <div class="vi-mag" id="viAm">|a| = 180.3</div>
        </div>
        <div class="vi-card vb">
          <div class="vi-label">Vector b</div>
          <div class="vi-value" id="viB">(100, 150)</div>
          <div class="vi-mag" id="viBm">|b| = 180.3</div>
        </div>
        <div class="vi-card vr">
          <div class="vi-label" id="viRL">a + b</div>
          <div class="vi-value" id="viR">(250, 250)</div>
          <div class="vi-mag" id="viRm">|a+b| = 353.6</div>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="overlay" id="overlay"></div>

<script>
// ── State ──────────────────────────────────────────────────────────
const S = {
  mode: 'addition',
  vA: { x: 150, y: 100 },
  vB: { x: 100, y: 150 },
  scalar: 1.5,
  drag: null,
  animating: false,
  animT: 0,
};

// ── Canvas setup ───────────────────────────────────────────────────
const canvas = document.getElementById('vc');
const ctx = canvas.getContext('2d');
const wrap = document.getElementById('canvasWrap');

// Logical canvas size (always 800×560)
const W = 800, H = 560;
let DPR = 1;
let OX = W / 2, OY = H / 2;

function resizeCanvas() {
  DPR = Math.min(window.devicePixelRatio || 1, 2);
  const cssW = wrap.clientWidth;
  const cssH = Math.round(cssW * H / W);
  canvas.style.width = cssW + 'px';
  canvas.style.height = cssH + 'px';
  canvas.width = Math.round(cssW * DPR);
  canvas.height = Math.round(cssH * DPR);
  ctx.setTransform(1, 0, 0, 1, 0, 0);
  // Scale so that our logical W×H coordinate space fills the canvas
  const scaleX = (cssW * DPR) / W;
  const scaleY = (cssH * DPR) / H;
  ctx.scale(scaleX, scaleY);
  draw();
}

const ro = new ResizeObserver(() => resizeCanvas());
ro.observe(wrap);

// ── Pointer → logical coords ───────────────────────────────────────
function logicalXY(e) {
  const r = canvas.getBoundingClientRect();
  const cssX = (e.clientX ?? e.touches[0].clientX) - r.left;
  const cssY = (e.clientY ?? e.touches[0].clientY) - r.top;
  return { x: cssX * W / r.width, y: cssY * H / r.height };
}

// ── Drag helpers ───────────────────────────────────────────────────
function nearEndpoint(px, py, vec) {
  const ex = OX + vec.x, ey = OY - vec.y;
  return Math.hypot(px - ex, py - ey) < 22;
}
function startDrag(e) {
  const { x, y } = logicalXY(e);
  if (nearEndpoint(x, y, S.vA)) S.drag = 'A';
  else if (S.mode !== 'scalar' && nearEndpoint(x, y, S.vB)) S.drag = 'B';
}
function moveDrag(e) {
  if (!S.drag) return;
  e.preventDefault();
  const { x, y } = logicalXY(e);
  const v = { x: x - OX, y: OY - y };
  if (S.drag === 'A') S.vA = v; else S.vB = v;
  refresh();
}
function endDrag() { S.drag = null; }

canvas.addEventListener('mousedown', startDrag);
canvas.addEventListener('mousemove', moveDrag);
canvas.addEventListener('mouseup', endDrag);
canvas.addEventListener('mouseleave', endDrag);
canvas.addEventListener('touchstart', startDrag, { passive: false });
canvas.addEventListener('touchmove', moveDrag, { passive: false });
canvas.addEventListener('touchend', endDrag);

// ── Animation ──────────────────────────────────────────────────────
let animRAF;
function startAnim() {
  if (S.mode !== 'addition') return;
  S.animating = true; S.animT = 0;
  document.getElementById('btnAnim').disabled = true;
  function tick() {
    S.animT = Math.min(S.animT + 0.018, 1);
    draw();
    if (S.animT < 1) animRAF = requestAnimationFrame(tick);
    else { S.animating = false; document.getElementById('btnAnim').disabled = false; draw(); }
  }
  animRAF = requestAnimationFrame(tick);
}

// ── Draw ───────────────────────────────────────────────────────────
function drawGrid() {
  ctx.save();
  ctx.strokeStyle = 'rgba(255,255,255,0.045)';
  ctx.lineWidth = 1;
  for (let x = 0; x <= W; x += 40) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke(); }
  for (let y = 0; y <= H; y += 40) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke(); }
  ctx.strokeStyle = 'rgba(255,255,255,0.18)';
  ctx.lineWidth = 1.2;
  ctx.beginPath(); ctx.moveTo(OX,0); ctx.lineTo(OX,H); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(0,OY); ctx.lineTo(W,OY); ctx.stroke();
  // axis labels
  ctx.fillStyle = 'rgba(255,255,255,0.22)';
  ctx.font = '11px DM Mono, monospace';
  ctx.fillText('x', W - 16, OY - 8);
  ctx.fillText('y', OX + 8, 16);
  ctx.restore();
}

function arrow(x1,y1,x2,y2,col,lbl,lw=2.5) {
  const dx = x2-x1, dy = y2-y1, len = Math.hypot(dx,dy);
  if (len < 2) return;
  const ang = Math.atan2(dy,dx), as = 13;
  ctx.save();
  ctx.strokeStyle = col; ctx.fillStyle = col; ctx.lineWidth = lw; ctx.lineCap = 'round';
  ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(x2,y2);
  ctx.lineTo(x2 - as*Math.cos(ang - Math.PI/6), y2 - as*Math.sin(ang - Math.PI/6));
  ctx.lineTo(x2 - as*Math.cos(ang + Math.PI/6), y2 - as*Math.sin(ang + Math.PI/6));
  ctx.closePath(); ctx.fill();
  if (lbl) {
    ctx.font = 'bold 14px Syne, sans-serif';
    ctx.fillStyle = col;
    const ox = dx > 0 ? 10 : -28, oy = dy < 0 ? -10 : 20;
    ctx.fillText(lbl, x2 + ox, y2 + oy);
  }
  ctx.restore();
}

function dashed(x1,y1,x2,y2,col) {
  ctx.save();
  ctx.strokeStyle=col; ctx.lineWidth=1.2; ctx.setLineDash([5,5]);
  ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke();
  ctx.setLineDash([]);
  ctx.restore();
}

function draw() {
  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = '#08080f';
  ctx.fillRect(0, 0, W, H);
  drawGrid();

  const eA = { x: OX + S.vA.x, y: OY - S.vA.y };
  const eB = { x: OX + S.vB.x, y: OY - S.vB.y };

  if (S.mode === 'addition') {
    const t = S.animating ? S.animT : 1;
    arrow(OX, OY, eA.x, eA.y, '#00e5ff', 'a');
    const bEnd = { x: OX + S.vB.x * t, y: OY - S.vB.y * t };
    arrow(OX, OY, bEnd.x, bEnd.y, '#e040fb', 'b');
    // parallelogram dashes
    dashed(eA.x, eA.y, eA.x + S.vB.x, eA.y - S.vB.y, 'rgba(224,64,251,0.35)');
    dashed(eB.x, eB.y, eB.x + S.vA.x, eB.y - S.vA.y, 'rgba(0,229,255,0.3)');
    // resultant
    if (t > 0.55) {
      const rt = Math.min(1, (t - 0.55) / 0.45);
      const rx = OX + (S.vA.x + S.vB.x) * rt;
      const ry = OY - (S.vA.y + S.vB.y) * rt;
      arrow(OX, OY, rx, ry, '#ffd740', 'a+b', 3);
    }
    // moving b tail to tip of a (tip-to-tail visualisation when animating)
    if (S.animating && t > 0.3) {
      const fade = Math.min(1, (t-0.3)/0.3);
      dashed(eA.x, eA.y, eA.x + S.vB.x*fade, eA.y - S.vB.y*fade, `rgba(224,64,251,${fade*0.55})`);
    }

  } else if (S.mode === 'scalar') {
    arrow(OX, OY, eA.x, eA.y, '#00e5ff', 'a');
    const sx = OX + S.vA.x * S.scalar, sy = OY - S.vA.y * S.scalar;
    arrow(OX, OY, sx, sy, '#ff6d00', (S.scalar.toFixed(1))+'a', 3);

  } else { // dot
    arrow(OX, OY, eA.x, eA.y, '#00e5ff', 'a');
    arrow(OX, OY, eB.x, eB.y, '#e040fb', 'b');
    const dot = S.vA.x*S.vB.x + S.vA.y*S.vB.y;
    const magA2 = S.vA.x*S.vA.x + S.vA.y*S.vA.y;
    if (magA2 > 1) {
      const ps = dot / magA2;
      const px = OX + S.vA.x * ps, py = OY - S.vA.y * ps;
      arrow(OX, OY, px, py, '#69ff47', 'proj', 2);
      dashed(px, py, eB.x, eB.y, 'rgba(105,255,71,0.45)');
      ctx.save();
      ctx.fillStyle = 'rgba(105,255,71,0.3)';
      ctx.beginPath(); ctx.arc(px, py, 5, 0, Math.PI*2); ctx.fill();
      ctx.restore();
    }
    const magA = Math.sqrt(magA2);
    const magB = Math.sqrt(S.vB.x*S.vB.x + S.vB.y*S.vB.y);
    const ang = Math.acos(Math.max(-1, Math.min(1, dot / (magA*magB + 1e-9)))) * 180 / Math.PI;
    ctx.save();
    ctx.fillStyle = 'rgba(255,255,255,0.9)';
    ctx.font = '600 15px Syne, sans-serif';
    ctx.fillText(`a · b = ${dot.toFixed(1)}`, 16, 30);
    ctx.fillText(`θ = ${ang.toFixed(1)}°`, 16, 52);
    ctx.restore();
  }

  // drag handles
  [eA, eB].forEach((e, i) => {
    if (i === 1 && S.mode === 'scalar') return;
    ctx.save();
    ctx.strokeStyle = i === 0 ? '#00e5ff' : '#e040fb';
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(e.x, e.y, 8, 0, Math.PI*2);
    ctx.fill(); ctx.stroke();
    ctx.restore();
  });
}

// ── UI updates ─────────────────────────────────────────────────────
function fmt(n) { return n.toFixed(1); }
function mag(v) { return Math.sqrt(v.x*v.x + v.y*v.y); }

function updateInfo() {
  const mA = mag(S.vA), mB = mag(S.vB);
  document.getElementById('viA').textContent = `(${Math.round(S.vA.x)}, ${Math.round(S.vA.y)})`;
  document.getElementById('viB').textContent = `(${Math.round(S.vB.x)}, ${Math.round(S.vB.y)})`;
  document.getElementById('viAm').textContent = `|a| = ${fmt(mA)}`;
  document.getElementById('viBm').textContent = `|b| = ${fmt(mB)}`;

  if (S.mode === 'addition') {
    const rx = S.vA.x+S.vB.x, ry = S.vA.y+S.vB.y;
    document.getElementById('viRL').textContent = 'a + b';
    document.getElementById('viR').textContent = `(${Math.round(rx)}, ${Math.round(ry)})`;
    document.getElementById('viRm').textContent = `|a+b| = ${fmt(Math.hypot(rx,ry))}`;
  } else if (S.mode === 'scalar') {
    document.getElementById('viRL').textContent = `${fmt(S.scalar)}a`;
    document.getElementById('viR').textContent = `(${Math.round(S.vA.x*S.scalar)}, ${Math.round(S.vA.y*S.scalar)})`;
    document.getElementById('viRm').textContent = `|${fmt(S.scalar)}a| = ${fmt(Math.abs(S.scalar)*mA)}`;
  } else {
    const d = S.vA.x*S.vB.x + S.vA.y*S.vB.y;
    document.getElementById('viRL').textContent = 'a · b';
    document.getElementById('viR').textContent = fmt(d);
    document.getElementById('viRm').textContent = '';
  }
}

function setMode(m) {
  S.mode = m;
  cancelAnimationFrame(animRAF);
  S.animating = false;
  S.animT = 0;
  document.getElementById('btnAdd').className = 'btn' + (m==='addition' ? ' active' : '');
  document.getElementById('btnSca').className = 'btn' + (m==='scalar'   ? ' active' : '');
  document.getElementById('btnDot').className = 'btn' + (m==='dot'      ? ' active' : '');
  document.getElementById('sliderRow').style.display = m === 'scalar' ? 'flex' : 'none';
  document.getElementById('btnAnim').disabled = (m !== 'addition');
  document.getElementById('btnAnim').style.opacity = (m !== 'addition') ? '0.35' : '1';
  refresh();
}

function refresh() { updateInfo(); updateTheory(); draw(); }

// ── Theory ─────────────────────────────────────────────────────────
function updateTheory() {
  const mA = mag(S.vA).toFixed(1), mB = mag(S.vB).toFixed(1);
  const ax = Math.round(S.vA.x), ay = Math.round(S.vA.y);
  const bx = Math.round(S.vB.x), by = Math.round(S.vB.y);

  const data = {
    addition: {
      title: 'Vector addition',
      def: 'Adding two vectors combines their components. Geometrically it\'s a tip-to-tail placement — place the tail of <strong style="color:var(--magenta)">b</strong> at the head of <strong style="color:var(--cyan)">a</strong>; the result stretches from the origin to the new head.',
      formula: `\\[\\vec{a}+\\vec{b}=\\begin{pmatrix}a_x+b_x\\\\a_y+b_y\\end{pmatrix}\\]`,
      props: ['Commutative: \\(\\vec{a}+\\vec{b}=\\vec{b}+\\vec{a}\\)', 'Associative: \\((\\vec{a}+\\vec{b})+\\vec{c}=\\vec{a}+(\\vec{b}+\\vec{c})\\)', 'Identity: \\(\\vec{a}+\\vec{0}=\\vec{a}\\)', 'Inverse: \\(\\vec{a}+(-\\vec{a})=\\vec{0}\\)'],
      geo: 'The dashed lines form a parallelogram. Both diagonals reach the same sum — proving commutativity visually.',
      ex: `\\[\\begin{pmatrix}${ax}\\\\${ay}\\end{pmatrix}+\\begin{pmatrix}${bx}\\\\${by}\\end{pmatrix}=\\begin{pmatrix}${ax+bx}\\\\${ay+by}\\end{pmatrix}\\]`,
      ins: 'Vectors model displacements, forces, and velocities. Their sum is the net effect — essential in physics, graphics, and navigation.'
    },
    scalar: {
      title: 'Scalar multiplication',
      def: 'A scalar stretches or shrinks a vector. Negative scalars flip its direction.',
      formula: `\\[c\\vec{a}=\\begin{pmatrix}ca_x\\\\ca_y\\end{pmatrix},\\quad|c\\vec{a}|=|c|\\,|\\vec{a}|\\]`,
      props: ['Distributive over vectors: \\(c(\\vec{a}+\\vec{b})=c\\vec{a}+c\\vec{b}\\)', 'Distributive over scalars: \\((c+d)\\vec{a}=c\\vec{a}+d\\vec{a}\\)', 'Associative: \\((cd)\\vec{a}=c(d\\vec{a})\\)', 'Identity: \\(1\\cdot\\vec{a}=\\vec{a}\\)'],
      geo: `c > 1 stretches · 0 < c < 1 shrinks · c < 0 reverses direction. The orange vector is always collinear with a.`,
      ex: `\\[${S.scalar.toFixed(2)}\\cdot\\begin{pmatrix}${ax}\\\\${ay}\\end{pmatrix}=\\begin{pmatrix}${Math.round(ax*S.scalar)}\\\\${Math.round(ay*S.scalar)}\\end{pmatrix}\\]`,
      ins: 'Used in physics to scale velocities, forces, or field strengths; in computer graphics for zooming and normalisation.'
    },
    dot: {
      title: 'Dot product',
      def: 'The dot product projects one vector onto another, yielding a scalar that measures directional agreement.',
      formula: `\\[\\vec{a}\\cdot\\vec{b}=a_xb_x+a_yb_y=|\\vec{a}||\\vec{b}|\\cos\\theta\\]`,
      props: ['Commutative: \\(\\vec{a}\\cdot\\vec{b}=\\vec{b}\\cdot\\vec{a}\\)', 'Distributive: \\(\\vec{a}\\cdot(\\vec{b}+\\vec{c})=\\vec{a}\\cdot\\vec{b}+\\vec{a}\\cdot\\vec{c}\\)', 'Orthogonal iff zero: \\(\\vec{a}\\cdot\\vec{b}=0\\Leftrightarrow\\vec{a}\\perp\\vec{b}\\)', 'Self-dot: \\(\\vec{a}\\cdot\\vec{a}=|\\vec{a}|^2\\)'],
      geo: 'The green vector is the projection of b onto a. The dashed line is perpendicular to a.',
      ex: (() => {
        const d = ax*bx + ay*by;
        const ang = (Math.acos(Math.max(-1,Math.min(1,d/(parseFloat(mA)*parseFloat(mB)+1e-9))))*180/Math.PI).toFixed(1);
        return `\\[\\vec{a}\\cdot\\vec{b}=${ax}\\cdot${bx}+${ay}\\cdot${by}=${d}\\]\\[\\theta=\\cos^{-1}\\!\\left(\\frac{${d}}{${mA}\\cdot${mB}}\\right)\\approx${ang}°\\]`;
      })(),
      ins: 'Dot product powers cosine similarity in ML, lighting in 3-D graphics, and work calculation in physics (W = F·d).'
    }
  };

  const d = data[S.mode];
  document.getElementById('theoryBody').innerHTML = `
    <div class="th-section"><h3>${d.title}</h3><p>${d.def}</p></div>
    <div class="formula-box">${d.formula}</div>
    <div class="th-section">
      <h3>Properties</h3>
      <ul class="prop-list">${d.props.map(p=>`<li>${p}</li>`).join('')}</ul>
    </div>
    <div class="hl-box"><strong>Geometry</strong><br>${d.geo}</div>
    <div class="ex-box"><strong>Current vectors</strong>${d.ex}</div>
    <div class="ins-box"><strong>Why it matters</strong><br>${d.ins}</div>
  `;
  if (window.MathJax) MathJax.typesetPromise([document.getElementById('theoryBody')]).catch(()=>{});
}

// ── Mobile theory sheet ────────────────────────────────────────────
const panel = document.getElementById('theoryPanel');
const ov = document.getElementById('overlay');

function openTheory() {
  panel.classList.add('open');
  ov.classList.add('active');
  document.body.style.overflow = 'hidden';
}
function closeTheory() {
  panel.classList.remove('open');
  ov.classList.remove('active');
  document.body.style.overflow = '';
}

document.getElementById('btnTheory').addEventListener('click', openTheory);
document.getElementById('closeBtn').addEventListener('click', closeTheory);
ov.addEventListener('click', closeTheory);

// drag-to-dismiss the sheet
let sheetStartY = 0, sheetStartT = 0;
panel.addEventListener('touchstart', e => {
  sheetStartY = e.touches[0].clientY;
  sheetStartT = Date.now();
}, { passive: true });
panel.addEventListener('touchend', e => {
  const dy = e.changedTouches[0].clientY - sheetStartY;
  const dt = Date.now() - sheetStartT;
  if (dy > 60 || (dy > 30 && dt < 200)) closeTheory();
}, { passive: true });

// ── Button wiring ──────────────────────────────────────────────────
document.getElementById('btnAdd').addEventListener('click', () => setMode('addition'));
document.getElementById('btnSca').addEventListener('click', () => setMode('scalar'));
document.getElementById('btnDot').addEventListener('click', () => setMode('dot'));

document.getElementById('btnAnim').addEventListener('click', startAnim);

document.getElementById('btnReset').addEventListener('click', () => {
  cancelAnimationFrame(animRAF);
  S.vA = { x: 150, y: 100 }; S.vB = { x: 100, y: 150 };
  S.scalar = 1.5; S.animating = false; S.animT = 0;
  document.getElementById('scalarSlider').value = 1.5;
  document.getElementById('scalarVal').textContent = '1.50';
  document.getElementById('btnAnim').disabled = false;
  refresh();
});

document.getElementById('scalarSlider').addEventListener('input', e => {
  S.scalar = parseFloat(e.target.value);
  document.getElementById('scalarVal').textContent = S.scalar.toFixed(2);
  refresh();
});

// ── Boot ───────────────────────────────────────────────────────────
setMode('addition');
</script>
