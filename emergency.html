<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Emergency Medical Info — LumenOS MediScan</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{--red:#E63946;--navy:#0A2540;--teal:#00B4D8;--green:#2EC4B6;}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'DM Sans',sans-serif;background:#f0f6fc;color:#0A2540;min-height:100vh;padding:20px;}
  .container{max-width:560px;margin:0 auto;}
  .header-bar{background:var(--navy);color:white;padding:16px 20px;border-radius:16px 16px 0 0;display:flex;align-items:center;gap:12px;}
  .header-bar img{height:28px;filter:invert(1);}
  .header-bar .title{font-size:15px;font-weight:700;letter-spacing:-.3px;}
  .header-bar .sub{font-size:11px;color:rgba(255,255,255,.5);margin-top:1px;}
  .emergency-banner{background:#fff0f1;border:2px solid var(--red);border-top:none;padding:14px 20px;display:flex;align-items:center;gap:10px;font-weight:700;color:var(--red);font-size:14px;}
  .card{background:white;border:1px solid #d6e6f2;border-top:none;padding:20px;}
  .card:last-child{border-radius:0 0 16px 16px;}
  .section-title{font-size:10px;letter-spacing:2px;text-transform:uppercase;font-weight:700;color:var(--teal);margin-bottom:12px;margin-top:20px;}
  .section-title:first-child{margin-top:0;}
  .field{margin-bottom:12px;}
  .field .k{font-size:11px;color:#8CA9C4;font-weight:600;margin-bottom:2px;}
  .field .v{font-size:14px;font-weight:600;color:#0A2540;}
  .blood-type{font-size:36px;font-weight:800;color:var(--red);letter-spacing:-1px;}
  .allergy-pill{display:inline-block;background:#fff0f1;border:1px solid rgba(230,57,70,.3);color:var(--red);border-radius:6px;padding:3px 10px;font-size:12px;font-weight:700;margin:2px;}
  .med-pill{display:inline-block;background:#f0f9ff;border:1px solid rgba(0,180,216,.2);color:#0096b4;border-radius:6px;padding:3px 10px;font-size:12px;font-weight:600;margin:2px;}
  .cond-pill{display:inline-block;background:#f7fafd;border:1px solid #d6e6f2;color:#0A2540;border-radius:6px;padding:3px 10px;font-size:12px;font-weight:600;margin:2px;}
  .spinner{display:inline-block;width:24px;height:24px;border:3px solid #d6e6f2;border-top-color:var(--teal);border-radius:50%;animation:spin .7s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .error-msg{text-align:center;padding:40px;color:var(--red);font-weight:600;}
  .loading-msg{text-align:center;padding:60px;color:#8CA9C4;}
  .footer-note{text-align:center;font-size:11px;color:#8CA9C4;padding:16px;letter-spacing:.5px;}
  .inactive-banner{background:#fff8f0;border:2px solid #f4a261;border-radius:16px;padding:24px;text-align:center;color:#c47c2b;font-weight:700;font-size:15px;}
  .rate-banner{background:#fff8f0;border:2px solid #f4a261;border-radius:16px;padding:24px;text-align:center;color:#c47c2b;font-weight:700;font-size:15px;}
</style>
</head>
<body>
<div class="container">
  <div id="root"><div class="loading-msg"><div class="spinner" style="margin:0 auto 16px"></div><div>Loading emergency data…</div></div></div>
</div>

<script>
const SUPABASE_URL = 'https://pzioskykakwhwdlcmwyv.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB6aW9za3lrYWt3aHdkbGNtd3l2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY2MzEwMjUsImV4cCI6MjA5MjIwNzAyNX0.oeOKDBxEzYkW9Zs7hQVkaAcHF0mJ5mhg5TV75M3nf-4';
const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

/* ── XSS escape ── */
function esc(s) {
  if (s == null) return '';
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;')
    .replace(/'/g,'&#39;');
}

/* ── Safe token extraction — NEVER concatenate into SQL ── */
function getToken() {
  const params = new URLSearchParams(window.location.search);
  const token = params.get('token');
  // Validate token is UUID-shaped (basic sanity, server enforces the real check)
  if (!token || !/^[0-9a-f-]{8,}$/i.test(token)) return null;
  return token;
}

/* ── Rate-limit check: max 20 scans per token per hour in scan_logs ── */
async function checkRateLimit(patientId) {
  const oneHourAgo = new Date(Date.now() - 60 * 60 * 1000).toISOString();
  const { count, error } = await sb
    .from('scan_logs')
    .select('*', { count: 'exact', head: true })
    .eq('patient_id', patientId)
    .gte('scanned_at', oneHourAgo);
  if (error) return false; // fail open — don't block legitimate emergencies
  return (count || 0) < 20;
}

/* ── Log this scan ── */
async function logScan(patientId) {
  await sb.from('scan_logs').insert({
    patient_id: patientId,
    scanned_at: new Date().toISOString(),
    location: 'QR Scan',
    // scanner_ip is set server-side in a production Edge Function
  });
}

/* ── Render helpers ── */
function pills(arr, cls) {
  if (!Array.isArray(arr) || !arr.length) return '<span style="color:#8CA9C4">None recorded</span>';
  return arr.map(v => `<span class="${cls}">${esc(v)}</span>`).join('');
}
function val(v) { return v ? esc(v) : '<span style="color:#8CA9C4">—</span>'; }

/* ── Main ── */
async function init() {
  const root = document.getElementById('root');
  const token = getToken();

  if (!token) {
    root.innerHTML = `<div class="error-msg">⚠ Invalid or missing QR token.<br><small>This link may be expired or tampered with.</small></div>`;
    return;
  }

  // Parameterised query — token never interpolated into SQL string
  const { data: patients, error } = await sb
    .from('patients')
    .select([
      'id','full_name','blood_type','allergies','current_medications','medical_conditions',
      'emergency_contact_name','emergency_contact_relation','emergency_contact_phone',
      'primary_doctor','doctor_contact','advance_directive','qr_active'
    ].join(','))
    .eq('qr_token', token)
    .limit(1);

  if (error || !patients || patients.length === 0) {
    root.innerHTML = `<div class="error-msg">⚠ Patient record not found.<br><small>The QR code may be invalid or expired.</small></div>`;
    return;
  }

  const p = patients[0];

  if (!p.qr_active) {
    root.innerHTML = `<div class="inactive-banner">🔒 This QR code has been deactivated.<br><small style="font-weight:400;font-size:13px;margin-top:8px;display:block">Contact the healthcare provider for a new code.</small></div>`;
    return;
  }

  // Rate limit check
  const allowed = await checkRateLimit(p.id);
  if (!allowed) {
    root.innerHTML = `<div class="rate-banner">⏳ Too many recent scans for this code.<br><small style="font-weight:400;font-size:13px;margin-top:8px;display:block">Please try again later or contact the clinic directly.</small></div>`;
    return;
  }

  // Log the scan (after rate check passes)
  logScan(p.id);

  root.innerHTML = `
    <div class="header-bar">
      <img src="https://3f811272e605d0fbd18ff3cfe4226002.cdn.bubble.io/f1760306942348x596155193204738700/klll.png" alt="LumenOS" onerror="this.style.display='none'">
      <div><div class="title">${esc(p.full_name)}</div><div class="sub">Emergency Medical Record</div></div>
    </div>
    <div class="emergency-banner">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2L1 21h22L12 2zm0 3.5l8.5 15h-17L12 5.5zM11 10v4h2v-4h-2zm0 6v2h2v-2h-2z"/></svg>
      EMERGENCY MEDICAL INFORMATION
    </div>
    <div class="card">
      <div class="section-title">Critical — For First Responders</div>
      <div class="field"><div class="k">Blood Type</div><div class="v blood-type">${p.blood_type ? esc(p.blood_type) : '<span style="font-size:18px;color:#8CA9C4">Unknown</span>'}</div></div>
      <div class="field"><div class="k">Known Allergies</div><div class="v">${pills(p.allergies, 'allergy-pill')}</div></div>
      <div class="field"><div class="k">Current Medications</div><div class="v">${pills(p.current_medications, 'med-pill')}</div></div>
      <div class="field"><div class="k">Medical Conditions</div><div class="v">${pills(p.medical_conditions, 'cond-pill')}</div></div>
    </div>
    <div class="card">
      <div class="section-title">Emergency Contact</div>
      <div class="field"><div class="k">Name</div><div class="v">${val(p.emergency_contact_name)}${p.emergency_contact_relation ? ' <span style="color:#8CA9C4;font-weight:400;font-size:13px">(' + esc(p.emergency_contact_relation) + ')</span>' : ''}</div></div>
      <div class="field"><div class="k">Phone</div><div class="v">${p.emergency_contact_phone ? `<a href="tel:${esc(p.emergency_contact_phone)}" style="color:var(--teal)">${esc(p.emergency_contact_phone)}</a>` : '—'}</div></div>
    </div>
    <div class="card">
      <div class="section-title">Primary Doctor</div>
      <div class="field"><div class="k">Doctor</div><div class="v">${val(p.primary_doctor)}</div></div>
      <div class="field"><div class="k">Contact</div><div class="v">${p.doctor_contact ? `<a href="tel:${esc(p.doctor_contact)}" style="color:var(--teal)">${esc(p.doctor_contact)}</a>` : '—'}</div></div>
    </div>
    ${p.advance_directive ? `<div class="card"><div class="section-title">Advance Directive</div><div style="font-size:14px;line-height:1.6;color:#0A2540">${esc(p.advance_directive)}</div></div>` : ''}
    <div class="footer-note">LumenOS MediScan QR • Powered by secure parameterised access</div>
  `;
}

init();
</script>
</body>
</html>
